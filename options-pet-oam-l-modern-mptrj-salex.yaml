# L-sized, current-schema PET-OAM-like training on the full prepared MPtrj
# memmap dataset, with validation on the prepared 30k sAlex memmap split.
#
# This mirrors options-pet-oam-xl-mptrj-salex.yaml structurally, but shrinks the
# PET network toward the recovered PET-OAM-L dimensions. It intentionally keeps
# the newer XL-style adaptive neighborhood/cutoff settings and the current
# metatrain target/loss conventions.

seed: 42
device: cuda
base_precision: 32

architecture:
  name: pet

  model:
    # Newer XL-style neighborhood/cutoff settings. To move closer to the older
    # released PET-OAM-L checkpoint, change these four fields to:
    # cutoff: 4.5
    # num_neighbors_adaptive: null
    # cutoff_function: Cosine
    # cutoff_width: 0.2
    cutoff: 10.0
    num_neighbors_adaptive: 40
    adaptive_cutoff_method: grid
    cutoff_function: Bump
    cutoff_width: 0.5

    # PET-OAM-L-sized representation widths/depths.
    d_pet: 512
    d_head: 512
    d_node: 2048
    d_feedforward: 1024
    num_heads: 8
    num_attention_layers: 2
    num_gnn_layers: 3

    # Current PET-OAM family choices.
    normalization: RMSNorm
    activation: SwiGLU
    attention_temperature: 1.0
    transformer_type: PreLN
    featurizer_type: feedforward
    zbl: false
    long_range:
      enable: false
      use_ewald: false
      smearing: 1.4
      kspace_resolution: 1.33
      interpolation_nodes: 5

  training:
    # Keep this false for a normal single-process run launched as
    # `python -m metatrain train ...`.
    distributed: false
    distributed_port: 39591

    # L-like batch_size, with current MemmapDataset atom-count batch packing.
    # batch_size is still used internally for composition/scaler fitting.
    batch_size: 16
    batch_atom_bounds: [null, null]
    max_atoms_per_batch: 512
    min_atoms_per_batch: 0

    # L-like trainer scale. This is more scratch-training-friendly than the
    # PET-OAM-XL fine-tuning learning rate of 5e-6.
    num_epochs: 5
    warmup_fraction: 0.1
    learning_rate: 1.0e-4
    weight_decay: null
    num_workers: null

    log_interval: 1
    checkpoint_interval: 1
    log_mae: true
    log_separate_blocks: false
    best_model_metric: rmse_prod
    grad_clip_norm: 1.0

    # Fit baselines/scales from the prepared MPtrj data instead of reusing the
    # fixed values recovered from the old PET-OAM-L checkpoint.
    scale_targets: true
    atomic_baseline: {}
    fixed_scaling_weights: {}
    per_structure_targets:
      - non_conservative_stress

    loss:
      energy:
        type: huber
        weight: 1.0
        reduction: mean
        delta: 0.015
        forces:
          type: huber
          weight: 1.0
          reduction: mean
          delta: 0.04
        # Use stress, not virial, because metatrain's MemmapDataset supports
        # stress gradients but not virial targets directly.
        stress:
          type: huber
          weight: 1.0
          reduction: mean
          delta: 0.03
      non_conservative_force:
        type: huber
        weight: 0.01
        reduction: mean
        delta: 0.01
      non_conservative_stress:
        type: huber
        weight: 0.01
        reduction: mean
        delta: 0.004

    finetune:
      method: full
      read_from: null
      config: {}
      inherit_heads: {}

training_set:
  systems:
    read_from: data
    length_unit: angstrom
  targets:
    energy:
      key: e
      quantity: energy
      unit: eV
      forces:
        key: f
      stress:
        key: s
    non_conservative_force:
      key: f
      quantity: force
      unit: eV/A
      sample_kind: atom
      type:
        cartesian:
          rank: 1
    non_conservative_stress:
      key: s
      quantity: pressure
      unit: eV/A^3
      sample_kind: system
      type:
        cartesian:
          rank: 2

validation_set:
  systems:
    read_from: data_salex_val_30k
    length_unit: angstrom
  targets:
    energy:
      key: e
      quantity: energy
      unit: eV
      forces:
        key: f
      stress:
        key: s
    non_conservative_force:
      key: f
      quantity: force
      unit: eV/A
      sample_kind: atom
      type:
        cartesian:
          rank: 1
    non_conservative_stress:
      key: s
      quantity: pressure
      unit: eV/A^3
      sample_kind: system
      type:
        cartesian:
          rank: 2

# Keep the full MPtrj training set intact and avoid drawing a random test split.
test_set:
  indices: []
