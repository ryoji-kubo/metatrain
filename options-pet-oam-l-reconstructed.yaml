# Reconstructed from lab-cosmo/upet models/pet-oam-l-v0.1.0.ckpt.
#
# This is the closest config recoverable from the public checkpoint. It preserves the
# upgraded PET architecture hypers, trainer hypers, fixed atomic baseline, target
# scaling, and loss weights/deltas found in the checkpoint.
#
# Missing from the checkpoint and therefore left as placeholders:
# - exact OMat/sAlex/MPtrj dataset files
# - preprocessing/filtering/deduplication
# - original train/validation/test split
# - exact raw extxyz target keys
# - possible earlier pretraining/fine-tuning stage, e.g. OMat -> sAlex+MPtrj
#
# Note: the checkpoint itself uses the older plural target name
# "non_conservative_forces". Current metatrain examples often use the singular
# "non_conservative_force"; keeping the plural here better matches the released
# PET-OAM-L checkpoint/output names, but may emit a deprecation warning.

architecture:
  name: pet

  model:
    cutoff: 4.5
    num_neighbors_adaptive: null
    adaptive_cutoff_method: grid
    cutoff_function: Cosine
    cutoff_width: 0.2
    d_pet: 512
    d_head: 512
    d_node: 2048
    d_feedforward: 1024
    num_heads: 8
    num_attention_layers: 2
    num_gnn_layers: 3
    normalization: RMSNorm
    activation: SwiGLU
    attention_temperature: 1.0
    transformer_type: PreLN
    featurizer_type: feedforward
    zbl: false
    long_range:
      enable: false
      use_ewald: false
      smearing: 1.4
      kspace_resolution: 1.33
      interpolation_nodes: 5

  training:
    # The checkpoint stored distributed: true. Change to false for a single-process
    # local/VSCode debugging run.
    distributed: true
    distributed_port: 39591

    batch_size: 16
    num_epochs: 5
    # The old checkpoint stored num_epochs_warmup: 0.5. In the current schema,
    # warmup_fraction is over total training steps, so 0.5 / 5 = 0.1.
    warmup_fraction: 0.1
    learning_rate: 1.0e-4
    weight_decay: null
    log_interval: 1
    checkpoint_interval: 1
    log_mae: true
    log_separate_blocks: false
    best_model_metric: rmse_prod
    grad_clip_norm: 1.0
    per_structure_targets: []

    scale_targets: true
    fixed_scaling_weights:
      energy: 0.7483054
      non_conservative_forces: 2.8356092
      non_conservative_stress: 0.058322243

    atomic_baseline:
