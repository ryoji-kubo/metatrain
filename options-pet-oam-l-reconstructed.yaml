    loss:
      energy:
        type: huber
        weight: 1.0
        reduction: mean
        delta: 0.015
        forces:
          type: huber
          weight: 1.0
          reduction: mean
          delta: 0.04
        virial:
          type: huber
          weight: 1.0
          reduction: mean
          delta: 0.03
      non_conservative_forces:
        type: huber
        weight: 0.01
        reduction: mean
        delta: 0.01
      non_conservative_stress:
        type: huber
        weight: 0.01
        reduction: mean
        delta: 0.004

    # The public PET-OAM-L checkpoint does not encode whether this was an active
    # fine-tuning stage from PET-OMat-L. The UPET docs describe PET-OAM as
    # OMat -> sAlex+MPtrj, but the exact staged recipe is not recoverable here.
    # finetune:
    #   method: full
    #   read_from: /path/to/pet-omat-l-v0.1.0.ckpt

training_set:
  systems:
    read_from: /path/to/pet-oam-train.extxyz
    reader: ase
    length_unit: angstrom
  targets:
    energy:
      quantity: energy
      read_from: /path/to/pet-oam-train.extxyz
      reader: ase
      key: energy
      unit: eV
      forces:
        read_from: /path/to/pet-oam-train.extxyz
        reader: ase
        key: forces
      # The checkpoint stores a strain gradient on the energy target. Its old loss
      # config called this "virial"; replace key/unit if your processed data stores
      # stress instead.
      virial:
        read_from: /path/to/pet-oam-train.extxyz
        reader: ase
        key: virial
    non_conservative_forces:
      quantity: force
      read_from: /path/to/pet-oam-train.extxyz
      reader: ase
      key: non_conservative_forces
      unit: eV/A
      sample_kind: atom
      type:
        cartesian:
          rank: 1
    non_conservative_stress:
      quantity: pressure
      read_from: /path/to/pet-oam-train.extxyz
      reader: ase
      key: non_conservative_stress
      unit: eV/A^3
      sample_kind: system
      type:
        cartesian:
          rank: 2

# Placeholders only. The original split is not stored in the checkpoint.
validation_set: 0.1
test_set: 0.1
